<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil — Anoor's Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: 'Inter', system-ui, sans-serif;
                background-color: #0F172A;
                color: #F1F5F9;
            }
        }
    </style>
</head>
<body class="min-h-screen antialiased">
    <!-- Include Navigation -->
    <div id="nav-placeholder"></div>
    <div id="hero-placeholder"></div>
    <div id="skills-placeholder"></div>
    <div id="footer-placeholder"></div>
    <script>
        function fetchHtmlFragment(url) {
            return fetch(url)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`${response.status} ${response.statusText}`);
                    }
                    return response.text();
                })
                .then(html => {
                    const match = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                    return match ? match[1] : html;
                });
        }

        fetchHtmlFragment('shared/nav.html')
            .then(data => {
                document.getElementById('nav-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading navigation:', error));
        fetchHtmlFragment('hero.html')
            .then(data => {
                document.getElementById('hero-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading hero section:', error));
        fetchHtmlFragment('skills.html')
            .then(data => {
                document.getElementById('skills-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading skills section:', error));
        fetchHtmlFragment('shared/footer.html')
            .then(data => {
                document.getElementById('footer-placeholder').innerHTML = data;
            })
            .catch(error => console.error('Error loading footer:', error));
    </script>

    </body>
</html>
