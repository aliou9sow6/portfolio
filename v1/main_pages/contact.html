<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="../style_pages/contact.css">
</head>
<body>
    <script>
    // Charger la barre de navigation
    fetch('../shared/nav.html') 
        .then(response => response.text())
        .then(data => {
            document.body.insertAdjacentHTML('afterbegin', data);
        });
    // Charger le pied de page
    fetch('../shared/footer.html')
        .then(response => response.text())
        .then(data => {
            document.body.insertAdjacentHTML('beforeend', data);
        });

    </script>
    <h2>Contactez-moi</h2>
    <p>Vous pouvez me contacter par email à <a href="mailto:monemail@example.com">monemail@example.com</a></p>
</body>
</html>
