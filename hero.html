<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil — Anoor's Portfolio</title>
    <link rel="stylesheet" href="../g-style.css">
    <link rel="stylesheet" href="../style_pages/hero.css">
</head>
<body>
    <!-- Hero Section -->
    <section class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-6 py-24 relative overflow-hidden">
        <!-- Ambient background orbs -->
        <div class="absolute inset-0 overflow-hidden pointer-events-none" aria-hidden="true">
            <div class="absolute -top-48 -left-48 w-96 h-96 rounded-full bg-blue-700/20 blur-3xl"></div>
            <div class="absolute top-1/2 -right-48 w-96 h-96 rounded-full bg-sky-500/10 blur-3xl"></div>
            <div class="absolute -bottom-48 left-1/3 w-80 h-80 rounded-full bg-blue-600/10 blur-3xl"></div>
        </div>

        <div class="max-w-6xl mx-auto grid lg:grid-cols-2 gap-12 lg:gap-20 items-center relative z-10 w-full">
            <!-- Text content -->
            <div class="order-2 lg:order-1 text-center lg:text-left">
                <!-- Status badge -->
                <div class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full bg-blue-600/15 border border-blue-500/30 text-blue-400 text-sm font-medium mb-8">
                    <span class="w-1.5 h-1.5 rounded-full bg-blue-400 animate-pulse"></span>
                    Disponible pour de nouveaux projets
                </div>

                <h1 class="text-5xl lg:text-6xl font-extrabold text-white leading-tight mb-5">
                    Bonjour, je suis<br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-sky-300 to-blue-500">
                        Anoor
                    </span>
                </h1>

                <p class="text-lg text-slate-400 mb-10 leading-relaxed max-w-lg mx-auto lg:mx-0">
                    Développeur passionné spécialisé en
                    <span class="text-slate-200 font-semibold">développement web &amp; mobile</span>.
                    Je crée des applications innovantes et résous des problèmes complexes.
                </p>

                <div class="flex flex-wrap gap-4 justify-center lg:justify-start">
                    <a href="main_pages/list-project.html"
                       class="px-6 py-3 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-semibold transition-all duration-200 hover:shadow-lg hover:shadow-blue-600/30 hover:-translate-y-0.5">
                        Voir mes projets
                    </a>
                    <a href="main_pages/contact.html"
                       class="px-6 py-3 rounded-lg border border-slate-600 hover:border-slate-400 text-slate-300 hover:text-white font-semibold transition-all duration-200 hover:-translate-y-0.5">
                        Me contacter
                    </a>
                </div>
            </div>

            <!-- Profile photo -->
            <div class="order-1 lg:order-2 flex justify-center">
                <div class="relative">
                    <!-- Glow behind photo -->
                    <div class="absolute inset-0 rounded-full bg-gradient-to-tr from-blue-600 to-sky-400 blur-3xl opacity-25 scale-125" aria-hidden="true"></div>
                    <!-- Photo ring -->
                    <div class="relative w-56 h-56 lg:w-72 lg:h-72 rounded-full overflow-hidden border-2 border-slate-700 ring-4 ring-blue-600/20 shadow-2xl">
                        <img src="shared/img/profile.png"
                             alt="Photo de profil d'Anoor"
                             class="w-full h-full object-cover">
                    </div>
                    <!-- Decorative dot ring -->
                    <div class="absolute -bottom-3 -right-3 w-12 h-12 rounded-full bg-slate-800 border-2 border-slate-700 flex items-center justify-center text-xl shadow-lg" aria-hidden="true">
                        💻
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
